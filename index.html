<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRP AI Video Studio</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* HEADER */
.header{
    padding:15px;
    text-align:center;
    background:#020617;
    font-size:20px;
}

/* AUTH */
.auth{
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

.auth input{
    padding:10px;
    border-radius:8px;
    border:none;
}

/* MAIN */
.container{
    padding:10px;
}

/* TEXT */
textarea{
    width:100%;
    height:100px;
    border-radius:10px;
    padding:10px;
}

/* BUTTONS */
button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    margin-top:8px;
}

/* REELS PREVIEW */
.reels{
    display:flex;
    overflow-x:auto;
    gap:10px;
    margin-top:10px;
}

.scene{
    min-width:120px;
    height:200px;
    background:#111;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    padding:5px;
}

/* CANVAS */
canvas{
    width:100%;
    max-width:400px;
    margin:10px auto;
    display:block;
    border-radius:10px;
    background:black;
}

/* SUBTITLES */
#subtitle{
    position:absolute;
    bottom:60px;
    width:100%;
    text-align:center;
    font-size:20px;
    color:white;
    text-shadow:0 0 10px black;
}
</style>
</head>

<body>

<div class="header">🎬 SRP AI Video Studio</div>

<!-- AUTH -->
<div class="auth">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div class="container">

<textarea id="text" placeholder="Enter script..."></textarea>

<button onclick="generateScenes()">Generate Scenes</button>
<button onclick="startVideo()">Create Video</button>

<div class="reels" id="reels"></div>

<p id="progress">Idle...</p>

<div style="position:relative">
<canvas id="canvas" width="480" height="800"></canvas>
<div id="subtitle"></div>
</div>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_flute.mp3">
</audio>

</div>

<script>

// 🔐 SUPABASE (YOUR KEYS)
const supabaseClient = supabase.createClient(
"https://cmxlfxqtrguuzpqdgcxv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

// AUTH
async function signup(){
await supabaseClient.auth.signUp({
email: email.value,
password: password.value
});
alert("Account created");
}

async function login(){
await supabaseClient.auth.signInWithPassword({
email: email.value,
password: password.value
});
alert("Logged in");
}

// SAVE
async function saveProject(text){
let user = await supabaseClient.auth.getUser();
if(!user.data.user) return;

await supabaseClient.from("projects").insert({
user_id:user.data.user.id,
script:text
});
}

// 🎬 SYSTEM
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

let scenes=[];

// GENERATE SCENES
function generateScenes(){
let input=document.getElementById("text").value;
scenes=input.split(".").filter(s=>s.trim());

let reels=document.getElementById("reels");
reels.innerHTML="";

scenes.forEach(scene=>{
let div=document.createElement("div");
div.className="scene";
div.innerText=scene;
reels.appendChild(div);
});
}

// AI IMAGE
async function getAI(prompt){
let img=new Image();
img.crossOrigin="anonymous";
img.src=`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt+" cinematic")}`;
await new Promise(r=>img.onload=r);
return img;
}

// SPEECH
function speak(text){
return new Promise(resolve=>{
let s=new SpeechSynthesisUtterance(text);
s.onend=resolve;
speechSynthesis.speak(s);
});
}

// DRAW
function draw(img){
ctx.drawImage(img,0,0,canvas.width,canvas.height);
}

// VIDEO
async function startVideo(){

document.getElementById("bgMusic").play();

for(let i=0;i<scenes.length;i++){

let scene=scenes[i];
document.getElementById("progress").innerText="Scene "+(i+1);

let img=await getAI(scene);
draw(img);

// SUBTITLE
document.getElementById("subtitle").innerText=scene;

await speak(scene);

// WAIT
await new Promise(r=>setTimeout(r,500));
}

document.getElementById("bgMusic").pause();

saveProject(document.getElementById("text").value);

document.getElementById("progress").innerText="Done ✅";
}

</script>

</body>
</html>
