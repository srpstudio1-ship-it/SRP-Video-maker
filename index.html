<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRP AI Video Studio</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* HEADER */
.header{
padding:12px;
text-align:center;
background:#020617;
font-size:18px;
}

/* AUTH */
.auth{
padding:10px;
display:flex;
gap:5px;
}

.auth input{
flex:1;
padding:8px;
border-radius:6px;
border:none;
}

/* MAIN */
.container{
padding:10px;
}

/* TEXT */
textarea{
width:100%;
height:100px;
border-radius:10px;
padding:10px;
}

/* BUTTON */
button{
padding:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
margin-top:5px;
width:100%;
}

/* REELS PREVIEW */
.preview{
width:100%;
max-width:400px;
margin:auto;
border-radius:20px;
overflow:hidden;
background:black;
position:relative;
}

/* CANVAS */
canvas{
width:100%;
}

/* SUBTITLE */
.subtitle{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-size:18px;
background:rgba(0,0,0,0.5);
padding:5px;
}

/* SCENES */
.sceneList{
margin-top:10px;
display:flex;
overflow:auto;
gap:5px;
}

.sceneCard{
background:#1e293b;
padding:8px;
border-radius:8px;
min-width:100px;
font-size:12px;
}
</style>
</head>

<body>

<div class="header">🎬 SRP AI Video Studio</div>

<div class="auth">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
</div>

<div class="container">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<textarea id="text" placeholder="Write story..."></textarea>

<button onclick="generateScenes()">Generate Scenes</button>
<button onclick="startVideo()">Create Video</button>
<button onclick="downloadVideo()">Download</button>

<div class="sceneList" id="sceneList"></div>

<div class="preview">
<canvas id="canvas" width="480" height="800"></canvas>
<div class="subtitle" id="subtitle"></div>
</div>

<p id="progress"></p>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_flute.mp3">
</audio>

</div>

<script>
// 🔐 SUPABASE (YOUR KEY USED)
const supabaseClient = supabase.createClient(
"https://cmxlfxqtrguuzpqdgcxv.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

// AUTH
async function signup(){
await supabaseClient.auth.signUp({
email:email.value,
password:password.value
});
alert("Signed up");
}

async function login(){
await supabaseClient.auth.signInWithPassword({
email:email.value,
password:password.value
});
alert("Logged in");
}

// SAVE
async function saveProject(text){
let user=await supabaseClient.auth.getUser();
if(!user.data.user)return;

await supabaseClient.from("projects").insert({
user_id:user.data.user.id,
script:text
});
}

// 🎬 CORE
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

let scenes=[];
let chunks=[];
let recorder;

// SPLIT
function generateScenes(){
let input=document.getElementById("text").value;
scenes=input.split(".");
let list=document.getElementById("sceneList");
list.innerHTML="";

scenes.forEach(s=>{
if(!s.trim())return;
let div=document.createElement("div");
div.className="sceneCard";
div.innerText=s;
list.appendChild(div);
});
}

// AI IMAGE
async function getVisual(prompt){
let img=new Image();
img.crossOrigin="anonymous";
img.src=`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;
await new Promise(r=>img.onload=r);
return img;
}

// SPEECH + SUBTITLE
function speak(text){
return new Promise(res=>{
let s=new SpeechSynthesisUtterance(text);
document.getElementById("subtitle").innerText=text;
s.onend=res;
speechSynthesis.speak(s);
});
}

// DRAW
function draw(img){
ctx.drawImage(img,0,0,canvas.width,canvas.height);
}

// VIDEO
async function startVideo(){

document.getElementById("music").play();

let stream=canvas.captureStream(30);
recorder=new MediaRecorder(stream);
recorder.ondataavailable=e=>chunks.push(e.data);
recorder.start();

for(let s of scenes){

if(!s.trim())continue;

document.getElementById("progress").innerText=s;

let img=await getVisual(s);

let speech=speak(s);

for(let i=0;i<60;i++){
draw(img);
await new Promise(r=>setTimeout(r,40));
}

await speech;
}

recorder.stop();
document.getElementById("music").pause();
saveProject(document.getElementById("text").value);
}

// DOWNLOAD
function downloadVideo(){
recorder.onstop=()=>{
let blob=new Blob(chunks);
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="video.webm";
a.click();
};
}
</script>

</body>
</html>
