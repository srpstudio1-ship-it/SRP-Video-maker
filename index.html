<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Generator PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* HEADER */
.header{
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    background:#020617;
}

/* MAIN */
.container{
    padding:15px;
}

/* TEXT INPUT */
textarea{
    width:100%;
    height:120px;
    padding:10px;
    border-radius:10px;
    border:none;
    margin-bottom:15px;
}

/* CONTROLS */
.controls{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:15px;
}

.controls label{
    font-size:14px;
}

.controls input{
    width:100%;
    padding:5px;
    border-radius:8px;
    border:none;
}

/* BUTTONS */
.buttons{
    display:flex;
    gap:10px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-size:16px;
}

/* PROGRESS */
#progress{
    margin:10px 0;
    font-size:14px;
}

/* CANVAS */
canvas{
    width:100%;
    max-width:400px;
    display:block;
    margin:15px auto;
    border-radius:12px;
    background:black;
}

/* MOBILE */
@media(max-width:600px){
    .controls{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="header">🎬 AI Video Generator PRO</div>

<div class="container">

<textarea id="text" placeholder="Enter your script..."></textarea>

<div class="controls">

<div>
<label>Text Color</label>
<input type="color" id="colorPicker" value="#3b82f6">
</div>

<div>
<label>Font Size</label>
<input type="range" id="fontSize" min="20" max="60" value="28">
</div>

<div>
<label>Background Color</label>
<input type="color" id="bgColor" value="#000000">
</div>

<div>
<label>Upload Background Image</label>
<input type="file" id="bgImage">
</div>

</div>

<div class="buttons">
<button onclick="startVideo()">Generate</button>
<button onclick="downloadVideo()">Download</button>
</div>

<p id="progress">Idle...</p>

<canvas id="canvas" width="480" height="800"></canvas>

</div>
<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let chunks = [];
let mediaRecorder;
let currentImage = null;

// FETCH IMAGE FROM FREE API
async function getImage(query){
    try{
        let url = `https://source.unsplash.com/800x600/?${query}`;
        let img = new Image();
        img.crossOrigin = "anonymous";
        img.src = url;

        await new Promise(res => img.onload = res);
        return img;
    }catch{
        return null;
    }
}

// SPEECH
function speak(text){
    return new Promise(resolve=>{
        let speech = new SpeechSynthesisUtterance(text);
        speech.onend = resolve;
        speechSynthesis.speak(speech);
    });
}

// DRAW
function drawScene(text, progress){

    if(currentImage){
        ctx.drawImage(currentImage,0,0,canvas.width,canvas.height);
    }else{
        ctx.fillStyle = "#000";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    ctx.fillStyle = "white";
    ctx.font = "28px Arial";

    wrapText(text, 40, 600, 400, 40);
}

// TEXT WRAP
function wrapText(text, x, y, maxWidth, lineHeight){
    let words = text.split(" ");
    let line = "";

    for(let n=0;n<words.length;n++){
        let testLine = line + words[n] + " ";
        let width = ctx.measureText(testLine).width;

        if(width > maxWidth && n>0){
            ctx.fillText(line, x, y);
            line = words[n] + " ";
            y += lineHeight;
        }else{
            line = testLine;
        }
    }
    ctx.fillText(line, x, y);
}

// START VIDEO
async function startVideo(){

    chunks = [];
    let input = document.getElementById("text").value;
    let scenes = input.split(".");
    let progress = document.getElementById("progress");

    let stream = canvas.captureStream(30);

    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.start();

    for(let i=0;i<scenes.length;i++){

        let scene = scenes[i].trim();
        if(!scene) continue;

        progress.innerText = `Loading visuals for: ${scene}`;

        // GET REAL IMAGE
        currentImage = await getImage(scene);

        let speaking = speak(scene);

        for(let t=0;t<80;t++){
            drawScene(scene, t/80);
            await new Promise(r=>setTimeout(r,40));
        }

        await speaking;
    }

    mediaRecorder.stop();
    progress.innerText = "Done ✅";
}

// DOWNLOAD
function downloadVideo(){
    mediaRecorder.onstop = ()=>{
        let blob = new Blob(chunks,{type:"video/webm"});
        let url = URL.createObjectURL(blob);

        let a = document.createElement("a");
        a.href = url;
        a.download = "video.webm";
        a.click();
    }
}
    </script>
    

</body>
</html>
