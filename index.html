<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRP AI Video Studio</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ================= GLOBAL ================= */
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial;
background:#0f172a;
color:white;
}

/* ================= HEADER ================= */
header{
padding:15px;
text-align:center;
background:#020617;
font-size:20px;
}

/* ================= AUTH ================= */
.auth{
padding:10px;
display:flex;
gap:5px;
}

.auth input{
flex:1;
padding:10px;
border-radius:8px;
border:none;
}

/* ================= EDITOR ================= */
.editor{
padding:10px;
}

textarea{
width:100%;
height:120px;
border-radius:10px;
padding:10px;
border:none;
}

/* ================= BUTTONS ================= */
button{
padding:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
margin-top:5px;
width:100%;
}

/* ================= SCENES ================= */
#sceneList{
display:flex;
overflow:auto;
gap:5px;
margin-top:10px;
}

.scene{
background:#1e293b;
padding:8px;
border-radius:8px;
min-width:100px;
font-size:12px;
}

/* ================= PREVIEW ================= */
.preview{
max-width:400px;
margin:auto;
margin-top:10px;
position:relative;
}

canvas{
width:100%;
border-radius:12px;
background:black;
}

/* ================= SUBTITLE ================= */
#subtitle{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
background:rgba(0,0,0,0.5);
padding:5px;
}

/* ================= PROGRESS ================= */
#progress{
margin-top:10px;
text-align:center;
}

</style>
</head>

<body>

<header>🎬 SRP AI Video Studio</header>

<div class="auth">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
</div>

<div class="editor">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<textarea id="text" placeholder="Write your story..."></textarea>

<button onclick="generateScenes()">Generate Scenes</button>
<button onclick="startVideo()">Create Video</button>
<button onclick="downloadVideo()">Download Video</button>

<div id="sceneList"></div>

<div class="preview">
<canvas id="canvas" width="480" height="800"></canvas>
<div id="subtitle"></div>
</div>

<p id="progress">Idle...</p>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_flute.mp3">
</audio>

</div>

<script>

/* ================= CONFIG ================= */

const SUPABASE_URL = "YOUR_URL";
const SUPABASE_KEY = "YOUR_KEY";

const supabaseClient = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

/* ================= AUTH ================= */

async function signup(){
try{
await supabaseClient.auth.signUp({
email:email.value,
password:password.value
});
alert("Signed Up");
}catch(e){
alert(e.message);
}
}

async function login(){
try{
await supabaseClient.auth.signInWithPassword({
email:email.value,
password:password.value
});
alert("Logged In");
}catch(e){
alert(e.message);
}
}

/* ================= STORAGE ================= */

async function saveProject(text){
let user = await supabaseClient.auth.getUser();

if(!user.data.user){
alert("Login first");
return;
}

await supabaseClient.from("projects").insert({
user_id:user.data.user.id,
script:text
});
}

/* ================= SCENES ================= */

let scenes = [];

function generateScenes(){
let input = document.getElementById("text").value;
scenes = input.split(".");
renderScenes();
}

function renderScenes(){
let list = document.getElementById("sceneList");
list.innerHTML = "";

scenes.forEach(s=>{
if(!s.trim()) return;

let div = document.createElement("div");
div.className="scene";
div.innerText = s;

list.appendChild(div);
});
}

/* ================= AI VISUAL ================= */

async function getVisual(prompt){
try{
let img = new Image();
img.crossOrigin="anonymous";
img.src = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;

await new Promise(res=>img.onload=res);

return img;
}catch(e){
return null;
}
}

/* ================= VIDEO ENGINE ================= */

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let recorder;
let chunks=[];

/* DRAW */
function draw(img){
if(img){
ctx.drawImage(img,0,0,canvas.width,canvas.height);
}else{
ctx.fillStyle="#000";
ctx.fillRect(0,0,canvas.width,canvas.height);
}
}

/* SPEECH */
function speak(text){
return new Promise(resolve=>{
let s = new SpeechSynthesisUtterance(text);
document.getElementById("subtitle").innerText = text;

s.onend = resolve;
speechSynthesis.speak(s);
});
}

/* MAIN VIDEO */
async function startVideo(){

chunks=[];

let progress = document.getElementById("progress");
document.getElementById("music").play();

let stream = canvas.captureStream(30);

recorder = new MediaRecorder(stream);
recorder.ondataavailable = e => chunks.push(e.data);
recorder.start();

for(let i=0;i<scenes.length;i++){

let scene = scenes[i].trim();
if(!scene) continue;

progress.innerText = "Processing: "+scene;

let img = await getVisual(scene);

let speech = speak(scene);

for(let t=0;t<60;t++){
draw(img);
await new Promise(r=>setTimeout(r,40));
}

await speech;
}

recorder.stop();
document.getElementById("music").pause();

progress.innerText = "Done ✅";

saveProject(document.getElementById("text").value);
}

/* ================= DOWNLOAD ================= */

function downloadVideo(){
recorder.onstop = ()=>{
let blob = new Blob(chunks);
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "video.webm";
a.click();
};
}

/* ================= EXTRA FEATURES ================= */

/* future expansion placeholders */

function applyFilters(){}
function addTransitions(){}
function exportHD(){}
function uploadYouTube(){}
function connectRunway(){}
function connectPika(){}

/* ================= END ================= */

</script>

</body>
</html>
