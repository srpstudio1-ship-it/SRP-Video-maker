<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRP AI Video Studio</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ================= GLOBAL ================= */
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial;
background:#0f172a;
color:white;
}

/* ================= HEADER ================= */
header{
padding:15px;
text-align:center;
background:#020617;
font-size:20px;
}

/* ================= AUTH ================= */
.auth{
padding:10px;
display:flex;
gap:5px;
}

.auth input{
flex:1;
padding:10px;
border-radius:8px;
border:none;
}

/* ================= EDITOR ================= */
.editor{
padding:10px;
}

textarea{
width:100%;
height:120px;
border-radius:10px;
padding:10px;
border:none;
}

/* ================= BUTTONS ================= */
button{
padding:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
margin-top:5px;
width:100%;
}

/* ================= SCENES ================= */
#sceneList{
display:flex;
overflow:auto;
gap:5px;
margin-top:10px;
}

.scene{
background:#1e293b;
padding:8px;
border-radius:8px;
min-width:100px;
font-size:12px;
}

/* ================= PREVIEW ================= */
.preview{
max-width:400px;
margin:auto;
margin-top:10px;
position:relative;
}

canvas{
width:100%;
border-radius:12px;
background:black;
}

/* ================= SUBTITLE ================= */
#subtitle{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
background:rgba(0,0,0,0.5);
padding:5px;
}

/* ================= PROGRESS ================= */
#progress{
margin-top:10px;
text-align:center;
}

</style>
</head>

<body>

<header>🎬 SRP AI Video Studio</header>

<div class="auth">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
</div>

<div class="editor">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<textarea id="text" placeholder="Write your story..."></textarea>

<button onclick="generateScenes()">Generate Scenes</button>
<button onclick="startVideo()">Create Video</button>
<button onclick="downloadVideo()">Download Video</button>

<div id="sceneList"></div>

<div class="preview">
<canvas id="canvas" width="480" height="800"></canvas>
<div id="subtitle"></div>
</div>

<p id="progress">Idle...</p>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_flute.mp3">
</audio>

</div>
<script>

/* ================= GLOBAL STATE ================= */

let scenes = [];
let currentSceneIndex = 0;
let isPlaying = false;

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let recorder;
let chunks = [];

/* ================= SETTINGS ================= */

const settings = {
textColor: "#ffffff",
fontSize: 28,
bgColor: "#000000",
speed: 40,
showSubtitle: true,
musicVolume: 0.5
};

/* ================= UI HELPERS ================= */

function updateProgress(text){
document.getElementById("progress").innerText = text;
}

function getInputValue(id){
return document.getElementById(id).value;
}

/* ================= AUTH ================= */

async function signup(){
try{
await supabaseClient.auth.signUp({
email:email.value,
password:password.value
});
alert("Signed Up");
}catch(e){
alert("Error: "+e.message);
}
}

async function login(){
try{
await supabaseClient.auth.signInWithPassword({
email:email.value,
password:password.value
});
alert("Logged In");
}catch(e){
alert("Error: "+e.message);
}
}

/* ================= STORAGE ================= */

async function saveProject(text){
try{
let user = await supabaseClient.auth.getUser();

if(!user.data.user){
alert("Login required");
return;
}

await supabaseClient.from("projects").insert({
user_id:user.data.user.id,
script:text,
created_at:new Date()
});

}catch(e){
console.log("Save error",e);
}
}

/* ================= SCENES ================= */

function generateScenes(){
let input = getInputValue("text");

if(!input){
alert("Enter text first");
return;
}

scenes = input.split(".").map(s=>s.trim()).filter(Boolean);

renderScenes();
}

function renderScenes(){
let list = document.getElementById("sceneList");
list.innerHTML = "";

scenes.forEach((scene,index)=>{

let div = document.createElement("div");
div.className="scene";
div.innerText = scene;

div.onclick = ()=>previewScene(index);

div.ondblclick = ()=>{
let newText = prompt("Edit scene:",scene);
if(newText){
scenes[index]=newText;
renderScenes();
}
};

list.appendChild(div);

});
}

/* ================= SCENE CONTROL ================= */

function previewScene(index){
currentSceneIndex = index;
drawTextOnly(scenes[index]);
}

function deleteScene(index){
scenes.splice(index,1);
renderScenes();
}

function moveSceneUp(index){
if(index>0){
[scenes[index],scenes[index-1]]=[scenes[index-1],scenes[index]];
renderScenes();
}
}

function moveSceneDown(index){
if(index<scenes.length-1){
[scenes[index],scenes[index+1]]=[scenes[index+1],scenes[index]];
renderScenes();
}
}

/* ================= VISUAL ================= */

async function getVisual(prompt){
try{
let img = new Image();
img.crossOrigin="anonymous";
img.src = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`;

await new Promise(res=>{
img.onload = res;
img.onerror = res;
});

return img;
}catch(e){
return null;
}
}

/* ================= DRAW ================= */

function clearCanvas(){
ctx.fillStyle = settings.bgColor;
ctx.fillRect(0,0,canvas.width,canvas.height);
}

function draw(img){
clearCanvas();

if(img){
ctx.drawImage(img,0,0,canvas.width,canvas.height);
}
}

function drawTextOnly(text){
clearCanvas();

ctx.fillStyle = settings.textColor;
ctx.font = settings.fontSize+"px Arial";

wrapText(text,40,400,400,40);
}

function wrapText(text,x,y,maxWidth,lineHeight){
let words=text.split(" ");
let line="";

for(let n=0;n<words.length;n++){
let test=line+words[n]+" ";
let width=ctx.measureText(test).width;

if(width>maxWidth && n>0){
ctx.fillText(line,x,y);
line=words[n]+" ";
y+=lineHeight;
}else{
line=test;
}
}
ctx.fillText(line,x,y);
}

/* ================= SPEECH ================= */

function speak(text){
return new Promise(resolve=>{
try{
let s = new SpeechSynthesisUtterance(text);

if(settings.showSubtitle){
document.getElementById("subtitle").innerText = text;
}else{
document.getElementById("subtitle").innerText = "";
}

s.onend = resolve;
speechSynthesis.speak(s);
}catch(e){
resolve();
}
});
}

/* ================= VIDEO ================= */

async function startVideo(){

if(isPlaying) return;

isPlaying = true;
chunks = [];

try{

updateProgress("Starting...");
document.getElementById("music").volume = settings.musicVolume;
document.getElementById("music").play();

let stream = canvas.captureStream(30);

recorder = new MediaRecorder(stream);
recorder.ondataavailable = e => chunks.push(e.data);
recorder.start();

for(let i=0;i<scenes.length;i++){

if(!isPlaying) break;

let scene = scenes[i];

updateProgress("Scene "+(i+1)+"/"+scenes.length);

let img = await getVisual(scene);

let speech = speak(scene);

for(let t=0;t<60;t++){
draw(img);
await new Promise(r=>setTimeout(r,settings.speed));
}

await speech;
}

recorder.stop();
document.getElementById("music").pause();

updateProgress("Done ✅");
saveProject(getInputValue("text"));

}catch(e){
alert("Error: "+e.message);
}

isPlaying = false;
}

/* ================= STOP ================= */

function stopVideo(){
isPlaying = false;
speechSynthesis.cancel();
document.getElementById("music").pause();
updateProgress("Stopped");
}

/* ================= DOWNLOAD ================= */

function downloadVideo(){
if(!recorder){
alert("No video yet");
return;
}

recorder.onstop = ()=>{
let blob=new Blob(chunks);
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="video.webm";
a.click();
};
}

/* ================= SETTINGS CONTROLS ================= */

function changeTextColor(val){
settings.textColor = val;
}

function changeFontSize(val){
settings.fontSize = val;
}

function changeSpeed(val){
settings.speed = val;
}

function toggleSubtitle(){
settings.showSubtitle = !settings.showSubtitle;
}

/* ================= EXTRA FEATURES ================= */

function applyFilters(){
console.log("Filters coming soon");
}

function addTransitions(){
console.log("Transitions coming soon");
}

function exportHD(){
console.log("HD export coming soon");
}

function uploadYouTube(){
console.log("YouTube upload requires backend");
}

function connectRunway(){
console.log("Requires paid API");
}

function connectPika(){
console.log("Requires paid API");
}

/* ================= INIT ================= */

window.onload = ()=>{
updateProgress("Ready 🚀");
};

</script>


</body>
</html>
